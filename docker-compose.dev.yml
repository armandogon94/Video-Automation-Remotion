# LOCAL DEVELOPMENT ONLY — Not for production/VPS deployment
# This project runs exclusively on macOS Apple Silicon

services:
  # Redis for optional BullMQ job queue (future enhancement)
  redis:
    image: redis:7-alpine
    container_name: video-factory-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # Video factory — Remotion + FFmpeg + Edge-TTS + faster-whisper
  video-factory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-factory
    ports:
      - "3100:3100"
    environment:
      REMOTION_CONCURRENCY: ${REMOTION_CONCURRENCY:-2}
      REMOTION_QUALITY: ${REMOTION_QUALITY:-80}
      FFMPEG_THREADS: ${FFMPEG_THREADS:-4}
      DEFAULT_VOICE: ${DEFAULT_VOICE:-es-MX-JorgeNeural}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-es}
      OUTPUT_DIR: /app/output
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./output:/app/output
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
