<!doctype html>
<html lang="es"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Combos — stacked components</title>
<style>
  :root{--bg:#0b0d12;--panel:#141821;--ink:#eef2f8;--muted:#8b94a6;--cyan:#5BC0E8;--gold:#D4AF37;--line:#222836}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,Inter,sans-serif;padding:30px 40px}
  h1{font-size:30px;margin:0 0 4px}.sub{color:var(--muted);max-width:1000px;margin:0 0 12px}.links a{color:var(--gold);margin-right:18px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:18px;margin-top:18px}@media(max-width:1300px){.grid{grid-template-columns:repeat(3,1fr)}}
  figure{margin:0;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:10px}
  video{width:100%;aspect-ratio:9/16;object-fit:cover;border-radius:9px;background:#000;display:block}
  .nm{font-weight:800;margin-top:8px;font-size:14px;color:var(--cyan)}.blurb{color:var(--muted);font-size:12.5px;margin-top:3px}
</style></head><body>
  <h1>Combos — multiple components stacked</h1>
  <p class="sub">Previews of "loaded" beats: several overlays running together over one clip, to see how busy/clean each combination reads.</p>
  <p class="links"><a href="INDEX.html">← Index</a> <a href="NEW-COMPONENTS.html">New components</a> <a href="VARIATIONS.html">Variations</a></p>
  <div class="grid" id="grid"></div>
<script>
  const ITEMS=[
    ["cb1-context-hud","Progress bar + section rail + name tag"],
    ["cb2-stat-punch","Count-up stat + AUTOMÁTICO keyword + badge"],
    ["cb3-compare-progress","VS comparison + progress bar"],
    ["cb4-stats-marker","Stat row + marker-sweep keyword"],
    ["cb5-depth-caption","★ Text BEHIND you + caption in front + progress"],
    ["cb6-quote-badge","Pull-quote + corner badge"],
  ];
  document.getElementById("grid").innerHTML=ITEMS.map(([k,b])=>`<figure><video src="output/autoedit/combo/${k}.mp4" muted loop autoplay playsinline controls></video><div class="nm">${k}</div><div class="blurb">${b}</div></figure>`).join("");
  addEventListener("DOMContentLoaded",()=>document.querySelectorAll("video").forEach(v=>v.play().catch(()=>{})));
</script></body></html>
